<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2, #6dd5ed);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            font-family: Arial, sans-serif;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
            color: rgb(77, 59, 130);
        }

        .form-control {
            border-radius: 12px;
        }

        .btn {
            border-radius: 12px;
        }

        .list-group-item {
            border-radius: 10px !important;
            margin-bottom: 10px;
        }

        footer {
            color: white;
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .date-box {
            font-size: 14px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="glass-card mx-auto" style="max-width: 800px;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="fw-bold mb-0">📝 Task Manager</h1>
                <div class="date-box" id="currentDate"></div>
            </div>

            <!-- Add Task Form -->
            <form action="/add" method="POST" class="d-flex mb-4">
                <input
                    type="text"
                    name="title"
                    class="form-control me-2"
                    placeholder="Enter a new task..."
                    required
                />
                <button class="btn btn-light text-primary fw-bold">
                    Add
                </button>
            </form>

            <!-- Task List -->
            <ul class="list-group">
                {% for task in tasks %}
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    <span>{{ task.title }}</span>
                    <div>
                        <a href="/edit/{{ task.id }}" class="btn btn-warning btn-sm">
                            Edit
                        </a>
                        <a href="/delete/{{ task.id }}" class="btn btn-danger btn-sm">
                            Delete
                        </a>
                    </div>
                </li>
                {% else %}
                <li class="list-group-item text-center text-muted">
                    No tasks added yet.
                </li>
                {% endfor %}
            </ul>
        </div>

        <!-- Footer -->
        <footer>
            © <span id="currentYear"></span> 📝 Student Task Manager | Built with 🐍 Flask & 🎨 Bootstrap 🚀
        </footer>
    </div>

    <script>
        // Current Year
        document.getElementById("currentYear").textContent =
            new Date().getFullYear();

        // Current Date
        const options = {
            weekday: "long",
            year: "numeric",
            month: "long",
            day: "numeric"
        };
        document.getElementById("currentDate").textContent =
            new Date().toLocaleDateString("en-US", options);
    </script>
</body>
</html>
